<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pachahex | Mis Repositorios</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --green: #4aaa6d;
            --green-light: #5cbe7f;
            --green-dark: #3d9159;
            --brown: #564a4a;
            --brown-light: #6e5f5f;
            --brown-dark: #453b3b;
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --bg-card-hover: #1a2744;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--brown-dark) 0%, var(--bg-dark) 50%, var(--green-dark) 100%);
            padding: 3rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 50%, rgba(74, 170, 109, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 50%, rgba(86, 74, 74, 0.15) 0%, transparent 50%);
        }

        .header-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--green);
            margin-bottom: 1.5rem;
            box-shadow: 0 0 30px rgba(74, 170, 109, 0.3);
            transition: transform 0.3s ease;
        }

        .avatar:hover {
            transform: scale(1.05);
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, var(--green), var(--green-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .profile-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--green);
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 1.5rem;
            border: 2px solid var(--green);
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .profile-link:hover {
            background-color: var(--green);
            color: #fff;
        }

        .profile-link svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 1.5rem 2rem;
            background: var(--bg-card);
            border-bottom: 2px solid var(--brown-dark);
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--green);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Search & Filters */
        .controls {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            padding: 0.75rem 1.25rem;
            border: 2px solid var(--brown);
            border-radius: 12px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s ease;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--green);
        }

        .search-box::placeholder {
            color: var(--text-secondary);
        }

        .sort-select {
            padding: 0.75rem 1.25rem;
            border: 2px solid var(--brown);
            border-radius: 12px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: border-color 0.3s ease;
        }

        .sort-select:focus {
            outline: none;
            border-color: var(--green);
        }

        /* Repos grid */
        .repos-container {
            max-width: 1200px;
            margin: 0 auto 3rem;
            padding: 0 2rem;
        }

        .repos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
        }

        .repo-card {
            background: var(--bg-card);
            border: 1px solid rgba(86, 74, 74, 0.3);
            border-radius: 16px;
            padding: 1.75rem;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
        }

        .repo-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--green), var(--brown));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .repo-card:hover {
            transform: translateY(-4px);
            border-color: var(--green);
            box-shadow: 0 12px 40px rgba(74, 170, 109, 0.15);
        }

        .repo-card:hover::before {
            opacity: 1;
        }

        .repo-name {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--green);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .repo-name svg {
            width: 18px;
            height: 18px;
            fill: var(--green);
            flex-shrink: 0;
        }

        .repo-description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
            flex-grow: 1;
            margin-bottom: 1.25rem;
        }

        .repo-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .meta-item svg {
            width: 14px;
            height: 14px;
            fill: var(--text-secondary);
        }

        .lang-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .fork-badge {
            font-size: 0.7rem;
            padding: 0.15rem 0.6rem;
            border-radius: 50px;
            background: rgba(86, 74, 74, 0.4);
            color: var(--brown-light);
            border: 1px solid var(--brown);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 4rem 2rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--brown);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            border-top: 1px solid rgba(86, 74, 74, 0.3);
        }

        .footer a {
            color: var(--green);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .repos-grid {
                grid-template-columns: 1fr;
            }

            .stats-bar {
                gap: 1.5rem;
            }

            .avatar {
                width: 90px;
                height: 90px;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-content">
            <img class="avatar" id="avatar" src="https://avatars.githubusercontent.com/u/86097624?v=4" alt="pachahex avatar">
            <h1 id="username">pachahex</h1>
            <p id="bio">Cargando perfil...</p>
            <a class="profile-link" href="https://github.com/pachahex" target="_blank" rel="noopener">
                <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                Ver perfil en GitHub
            </a>
        </div>
    </header>

    <div class="stats-bar" id="stats-bar">
        <div class="stat-item">
            <div class="stat-number" id="repo-count">-</div>
            <div class="stat-label">Repositorios</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="followers-count">-</div>
            <div class="stat-label">Seguidores</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="following-count">-</div>
            <div class="stat-label">Siguiendo</div>
        </div>
    </div>

    <div class="controls">
        <input type="text" class="search-box" id="search" placeholder="🔍 Buscar repositorio...">
        <select class="sort-select" id="sort">
            <option value="updated">Recientes</option>
            <option value="stars">Estrellas</option>
            <option value="name">Nombre</option>
            <option value="created">Creación</option>
        </select>
    </div>

    <main class="repos-container">
        <div class="repos-grid" id="repos-grid">
            <div class="loading">
                <div class="spinner"></div>
                <p>Cargando repositorios...</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>Hecho con 💚 por <a href="https://github.com/pachahex" target="_blank">pachahex</a> &middot; Datos obtenidos de la API de GitHub</p>
    </footer>

    <script>
        const USERNAME = 'pachahex';
        const LANG_COLORS = {
            JavaScript: '#f1e05a', Python: '#3572A5', HTML: '#e34c26', CSS: '#563d7c',
            TypeScript: '#2b7489', Java: '#b07219', 'C++': '#f34b7d', C: '#555555',
            'C#': '#178600', Ruby: '#701516', Go: '#00ADD8', PHP: '#4F5D95',
            Swift: '#ffac45', Kotlin: '#A97BFF', Rust: '#dea584', Shell: '#89e051',
            Dart: '#00B4AB', Vue: '#41b883', SCSS: '#c6538c', Jupyter: '#DA5B0B'
        };

        let allRepos = [];

        async function fetchProfile() {
            try {
                const res = await fetch(`https://api.github.com/users/${USERNAME}`);
                const user = await res.json();
                document.getElementById('bio').textContent = user.bio || 'Desarrollador en GitHub';
                document.getElementById('repo-count').textContent = user.public_repos || 0;
                document.getElementById('followers-count').textContent = user.followers || 0;
                document.getElementById('following-count').textContent = user.following || 0;
                if (user.avatar_url) {
                    document.getElementById('avatar').src = user.avatar_url;
                }
                if (user.name) {
                    document.getElementById('username').textContent = user.name;
                }
            } catch (e) {
                document.getElementById('bio').textContent = 'Desarrollador en GitHub';
            }
        }

        async function fetchRepos(page = 1, accumulated = []) {
            try {
                const res = await fetch(`https://api.github.com/users/${USERNAME}/repos?per_page=100&page=${page}&sort=updated`);
                const repos = await res.json();
                if (!Array.isArray(repos)) {
                    return accumulated;
                }
                accumulated = accumulated.concat(repos);
                if (repos.length === 100) {
                    return fetchRepos(page + 1, accumulated);
                }
                return accumulated;
            } catch (e) {
                return accumulated;
            }
        }

        function timeAgo(dateStr) {
            const now = new Date();
            const date = new Date(dateStr);
            const seconds = Math.floor((now - date) / 1000);
            const intervals = [
                { label: 'año', seconds: 31536000 },
                { label: 'mes', seconds: 2592000 },
                { label: 'día', seconds: 86400 },
                { label: 'hora', seconds: 3600 },
                { label: 'minuto', seconds: 60 }
            ];
            for (const interval of intervals) {
                const count = Math.floor(seconds / interval.seconds);
                if (count >= 1) {
                    const plural = count > 1 ? (interval.label === 'mes' ? 'es' : 's') : '';
                    return `hace ${count} ${interval.label}${plural}`;
                }
            }
            return 'justo ahora';
        }

        function renderRepos(repos) {
            const grid = document.getElementById('repos-grid');
            if (repos.length === 0) {
                grid.innerHTML = '<div class="no-results">No se encontraron repositorios 😕</div>';
                return;
            }
            grid.innerHTML = repos.map(repo => `
                <a href="${repo.html_url}" target="_blank" rel="noopener" class="repo-card">
                    <div class="repo-name">
                        <svg viewBox="0 0 16 16"><path d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 110-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 01-1.072 1.05A2.495 2.495 0 012 11.5v-9zm10.5-1h-8a1 1 0 00-1 1v6.708A2.486 2.486 0 014.5 9h8V1.5zm-8 11h8v1.5h-8a1 1 0 110-1.5z"/></svg>
                        ${repo.name}
                    </div>
                    <p class="repo-description">${repo.description || 'Sin descripción'}</p>
                    <div class="repo-meta">
                        ${repo.language ? `
                            <span class="meta-item">
                                <span class="lang-dot" style="background-color: ${LANG_COLORS[repo.language] || '#8b8b8b'}"></span>
                                ${repo.language}
                            </span>
                        ` : ''}
                        ${repo.stargazers_count > 0 ? `
                            <span class="meta-item">
                                <svg viewBox="0 0 16 16"><path d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"/></svg>
                                ${repo.stargazers_count}
                            </span>
                        ` : ''}
                        ${repo.forks_count > 0 ? `
                            <span class="meta-item">
                                <svg viewBox="0 0 16 16"><path d="M5 3.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm0 2.122a2.25 2.25 0 10-1.5 0v.878A2.25 2.25 0 005.75 8.5h1.5v2.128a2.251 2.251 0 101.5 0V8.5h1.5a2.25 2.25 0 002.25-2.25v-.878a2.25 2.25 0 10-1.5 0v.878a.75.75 0 01-.75.75h-4.5A.75.75 0 015 6.25v-.878zm3.75 7.378a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm3-8.75a.75.75 0 100-1.5.75.75 0 000 1.5z"/></svg>
                                ${repo.forks_count}
                            </span>
                        ` : ''}
                        ${repo.fork ? '<span class="fork-badge">Fork</span>' : ''}
                        <span class="meta-item">
                            <svg viewBox="0 0 16 16"><path d="M1.5 8a6.5 6.5 0 1113 0 6.5 6.5 0 01-13 0zM8 0a8 8 0 100 16A8 8 0 008 0zm.5 4.75a.75.75 0 00-1.5 0v3.5a.75.75 0 00.37.65l2.5 1.5a.75.75 0 10.76-1.3L8.5 7.94V4.75z"/></svg>
                            ${timeAgo(repo.updated_at)}
                        </span>
                    </div>
                </a>
            `).join('');
        }

        function sortRepos(repos, criteria) {
            const sorted = [...repos];
            switch (criteria) {
                case 'stars':
                    return sorted.sort((a, b) => b.stargazers_count - a.stargazers_count);
                case 'name':
                    return sorted.sort((a, b) => a.name.localeCompare(b.name));
                case 'created':
                    return sorted.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                case 'updated':
                default:
                    return sorted.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
            }
        }

        function filterAndRender() {
            const query = document.getElementById('search').value.toLowerCase();
            const sortBy = document.getElementById('sort').value;
            let filtered = allRepos.filter(repo =>
                repo.name.toLowerCase().includes(query) ||
                (repo.description && repo.description.toLowerCase().includes(query)) ||
                (repo.language && repo.language.toLowerCase().includes(query))
            );
            filtered = sortRepos(filtered, sortBy);
            renderRepos(filtered);
        }

        document.getElementById('search').addEventListener('input', filterAndRender);
        document.getElementById('sort').addEventListener('change', filterAndRender);

        async function init() {
            fetchProfile();
            allRepos = await fetchRepos();
            filterAndRender();
        }

        init();
    </script>

</body>
</html>
