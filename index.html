<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pachahex | Mis Repositorios</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="header">
        <div class="header-content">
            <img class="avatar" id="avatar" src="https://avatars.githubusercontent.com/u/86097624?v=4" alt="pachahex avatar">
            <h1 id="username">pachahex</h1>
            <p id="bio">Cargando perfil...</p>
            <a class="profile-link" href="https://github.com/pachahex" target="_blank" rel="noopener">
                <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                Ver perfil en GitHub
            </a>
        </div>
    </header>

    <div class="stats-bar" id="stats-bar">
        <div class="stat-item">
            <div class="stat-number" id="repo-count">-</div>
            <div class="stat-label">Repositorios</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="collab-count">-</div>
            <div class="stat-label">Colaboraciones</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="followers-count">-</div>
            <div class="stat-label">Seguidores</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="following-count">-</div>
            <div class="stat-label">Siguiendo</div>
        </div>
    </div>

    <nav class="tab-nav">
        <button class="tab-btn active" data-tab="my-repos" onclick="switchTab('my-repos')">
            <svg viewBox="0 0 16 16"><path d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 110-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 01-1.072 1.05A2.495 2.495 0 012 11.5v-9zm10.5-1h-8a1 1 0 00-1 1v6.708A2.486 2.486 0 014.5 9h8V1.5zm-8 11h8v1.5h-8a1 1 0 110-1.5z"/></svg>
            Repos
            <span class="tab-count" id="my-repos-count">0</span>
        </button>
        <button class="tab-btn" data-tab="collabs" onclick="switchTab('collabs')">
            <svg viewBox="0 0 16 16"><path d="M2 5.5a3.5 3.5 0 115.898 2.549 5.507 5.507 0 013.034 4.084.75.75 0 11-1.482.235 4.001 4.001 0 00-7.9 0 .75.75 0 01-1.482-.236A5.507 5.507 0 013.102 8.05 3.49 3.49 0 012 5.5zM11 4a.75.75 0 100 1.5 1.5 1.5 0 01.666 2.844.75.75 0 00-.416.672v.352a.75.75 0 00.574.73c1.2.289 2.162 1.2 2.522 2.372a.75.75 0 101.434-.44 5.01 5.01 0 00-2.56-3.012A3 3 0 0011 4zM5.5 3a2 2 0 100 4 2 2 0 000-4z"/></svg>
            Colaboraciones
            <span class="tab-count" id="collabs-count">0</span>
        </button>
    </nav>

    <div class="controls">
        <input type="text" class="search-box" id="search" placeholder="🔍 Buscar repositorio...">
        <select class="sort-select" id="sort">
            <option value="updated">Recientes</option>
            <option value="stars">Estrellas</option>
            <option value="name">Nombre</option>
            <option value="created">Creación</option>
        </select>
    </div>

    <main class="repos-container">
        <div class="repos-grid" id="repos-grid">
            <div class="loading">
                <div class="spinner"></div>
                <p>Cargando repositorios...</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>Hecho con 💚 por <a href="https://github.com/pachahex" target="_blank">pachahex</a> &middot; Datos obtenidos de la API de GitHub</p>
    </footer>

    <script src="js/app.js" defer></script>

</body>
</html>
